{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}STL ACM Chapter{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}STL ACM Chapter connects students and professionals through talks, networking, and practical computing sessions.{% endblock %}">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="{{ request.build_absolute_uri }}">

  <meta property="og:site_name" content="STL ACM Chapter">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}STL ACM Chapter{% endblock %}">
  <meta property="og:description" content="{% block og_description %}STL ACM Chapter connects students and professionals through talks, networking, and practical computing sessions.{% endblock %}">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}STL ACM Chapter{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}STL ACM Chapter connects students and professionals through talks, networking, and practical computing sessions.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}?v=6">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container">
        <a class="brand" href="{% url 'home' %}">
          <img src="{% static 'image/acmlogo.png' %}" alt="ACM logo" class="brand-logo">
          <span class="brand-text">STL ACM Chapter</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{% url 'home' %}">Home</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-content">
          <p>STL ACM Chapter · Community Events and Meetups</p>
          <div class="logos-grid">
            <img src="{% static 'image/acmlogo.png' %}" alt="ACM logo" class="partner-logo">
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // Meetup Slider Functionality
    const slider = document.querySelector('.slider');
    const slides = document.querySelectorAll('.slide');
    const prevBtn = document.querySelector('.slider-nav.prev');
    const nextBtn = document.querySelector('.slider-nav.next');
    const dots = document.querySelectorAll('.slider-dots .dot');
    
    let currentIndex = 0;
    let autoPlayInterval;

    function updateSlider() {
      const offset = -currentIndex * 100;
      slider.style.transform = `translateX(${offset}%)`;
      
      // Update dots
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentIndex);
      });
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % slides.length;
      updateSlider();
      resetAutoPlay();
    }

    function prevSlide() {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      updateSlider();
      resetAutoPlay();
    }

    function goToSlide(index) {
      currentIndex = index;
      updateSlider();
      resetAutoPlay();
    }

    function autoPlay() {
      autoPlayInterval = setInterval(nextSlide, 5000);
    }

    function resetAutoPlay() {
      clearInterval(autoPlayInterval);
      autoPlay();
    }

    // Event listeners
    if (prevBtn) prevBtn.addEventListener('click', prevSlide);
    if (nextBtn) nextBtn.addEventListener('click', nextSlide);
    
    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => goToSlide(index));
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'ArrowRight') nextSlide();
    });

    // Initialize
    if (slides.length > 0) {
      updateSlider();
      autoPlay();
    }
  </script>
</body>
</html>
